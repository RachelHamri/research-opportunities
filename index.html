  <script>
    const data = JSON.parse(document.getElementById("opportunity-data").textContent);
    const els = {
      title: document.getElementById("page-title"),
      updated: document.getElementById("updated"),
      search: document.getElementById("search"),
      organization: document.getElementById("organization"),
      type: document.getElementById("type"),
      location: document.getElementById("location"),
      fee: document.getElementById("fee"),
      from: document.getElementById("from"),
      to: document.getElementById("to"),
      count: document.getElementById("count"),
      results: document.getElementById("results")
    };
    els.title.textContent = data.title || "Research Opportunities";
    els.updated.textContent = formatUpdatedAt(data.updatedAt);
    fillSelect(els.organization, unique(data.opportunities.map((item) => item.organization)));
    fillSelect(els.type, unique(data.opportunities.map((item) => item.opportunityType)));
    [els.search, els.organization, els.type, els.location, els.fee, els.from, els.to].forEach((el) => el.addEventListener("input", render));
    render();

    function render() {
      const search = els.search.value.trim().toLowerCase();
      const fromTs = inputTs(els.from.value, false);
      const toTs = inputTs(els.to.value, true);
      const items = data.opportunities
        .filter((item) => !search || item.searchText.includes(search))
        .filter((item) => !els.organization.value || item.organization === els.organization.value)
        .filter((item) => !els.type.value || item.opportunityType === els.type.value)
        .filter((item) => !els.location.value || item.locationMode === els.location.value)
        .filter((item) => !els.fee.value || item.feeMode === els.fee.value)
        .filter((item) => {
          if (fromTs === undefined && toTs === undefined) return true;
          if (item.startDateTs === undefined) return false;
          return (fromTs === undefined || item.startDateTs >= fromTs) && (toTs === undefined || item.startDateTs <= toTs);
        })
        .sort((a, b) => (a.startDateTs ?? Infinity) - (b.startDateTs ?? Infinity) || a.name.localeCompare(b.name));
      els.count.textContent = items.length + " " + (items.length === 1 ? "opportunity" : "opportunities");
      els.results.replaceChildren(...items.map(card));
    }

    function card(item) {
      const article = node("article", "opportunity-card");
      const main = node("div", "card-main");
      const heading = node("div", "card-heading");
      if (item.opportunityType) heading.append(textNode("p", "card-type", item.opportunityType));
      heading.append(textNode("h2", "", item.name));
      if (item.organization) heading.append(textNode("p", "card-org", item.organization));
      main.append(heading);
      const meta = node("dl", "card-meta");
      const dates = formatDateRange(item.startDate, item.endDate);
      if (dates) meta.append(metaItem("Dates", dates));
      if (item.deadline) meta.append(metaItem("Deadline", item.deadline));
      if (item.location) meta.append(metaItem("Location", item.location));
      if (item.fee) meta.append(metaItem("Fee", item.fee));
      if (meta.children.length) main.append(meta);
      if (item.description) main.append(textNode("p", "card-description", item.description));
      if (item.eligibility) {
        const eligibility = textNode("p", "card-eligibility", "");
        const strong = document.createElement("strong");
        strong.textContent = "Eligibility:";
        eligibility.append(strong, " " + item.eligibility);
        main.append(eligibility);
      }
      article.append(main);
      if (item.mainLink || item.registrationLink) {
        const actions = node("div", "card-actions");
        if (item.mainLink) actions.append(link("Details", item.mainLink, ""));
        if (item.registrationLink) actions.append(link("Register", item.registrationLink, "primary-link"));
        article.append(actions);
      }
      return article;
    }

    function metaItem(label, value) {
      const wrap = document.createElement("div");
      wrap.append(textNode("dt", "", label), textNode("dd", "", value));
      return wrap;
    }

    function link(label, href, className) {
      const a = textNode("a", className, label);
      a.href = href;
      a.target = "_blank";
      a.rel = "noreferrer";
      return a;
    }

    function node(tag, className) {
      const element = document.createElement(tag);
      if (className) element.className = className;
      return element;
    }

    function textNode(tag, className, text) {
      const element = node(tag, className);
      element.textContent = text;
      return element;
    }

    function unique(values) {
      return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b));
    }

    function fillSelect(select, values) {
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.append(option);
      });
    }

    function inputTs(value, endOfDay) {
      if (!value) return undefined;
      const timestamp = Date.parse(value + (endOfDay ? "T23:59:59.999Z" : "T00:00:00.000Z"));
      return Number.isFinite(timestamp) ? timestamp : undefined;
    }

    function formatDateRange(start, end) {
      if (start && end && start !== end) return start + " to " + end;
      return start || end || "";
    }

    function formatUpdatedAt(value) {
      const date = new Date(value);
      if (!Number.isFinite(date.getTime())) return "Updated recently";
      return "Updated " + new Intl.DateTimeFormat(undefined, { year: "numeric", month: "short", day: "numeric" }).format(date);
    }
